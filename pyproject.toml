[project]
name = "homestation-core"
version = "0.1.0"
description = "A hexagonal Nx monorepo generated by cookiecutter."
authors = [
    {name = "Samuel Prime", email = "sprime01@gmail.com"}
]
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "pydantic>=1.10.0,<2.0.0",
    "injector>=0.20.1",
    "asyncpg>=0.29.0",
    "aio-pika>=9.0.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[tool.ruff]
line-length = 100

[tool.mypy]
ignore_missing_imports = true
allow_redefinition = true
show_error_codes = true
